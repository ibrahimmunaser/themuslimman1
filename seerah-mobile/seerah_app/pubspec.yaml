name: seerah_app
description: "The Muslim Man — Seerah Course Mobile App"
publish_to: 'none'
version: 1.0.19+19

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP + Cookies
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Media
  video_player: ^2.9.2
  chewie: ^1.8.5
  cached_network_image: ^3.4.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

  # In-App Purchases (Apple StoreKit + Google Play Billing)
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.4.0

  # Utils
  shared_preferences: ^2.3.4

  # Splash (runtime: main.dart calls FlutterNativeSplash.preserve/remove)
  flutter_native_splash: ^2.4.3
  webview_flutter: ^4.13.0
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

# ── App icon configuration ────────────────────────────────────────────────────
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  # Same square logo as the web/desktop dashboard sidebar
  image_path: "assets/images/logodashboard.png"

  android: true
  ios: true
  min_sdk_android: 23

  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/images/logodashboard.png"

  remove_alpha_ios: true

# ── Native splash screen configuration ───────────────────────────────────────
# Run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#0A0A0F"
  color_dark: "#0A0A0F"

  image: assets/images/splash_logo.png
  image_dark: assets/images/splash_logo.png

  android_12:
    color: "#0A0A0F"
    color_dark: "#0A0A0F"
    image: assets/images/splash_logo.png
    image_dark: assets/images/splash_logo.png
    icon_background_color: "#0A0A0F"
    icon_background_color_dark: "#0A0A0F"

  # Keep the splash visible until Flutter calls
  # FlutterNativeSplash.remove() — triggered in main.dart after init.
  fullscreen: true
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
