name: seerah_app
description: "The Muslim Man — Seerah Course Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.6

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP + Cookies
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Media
  video_player: ^2.9.2
  chewie: ^1.8.5
  cached_network_image: ^3.4.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

  # In-App Purchases (Apple StoreKit + Google Play Billing)
  in_app_purchase: ^3.2.0

  # Utils
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1

  # Splash (runtime: main.dart calls FlutterNativeSplash.preserve/remove)
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

# ── App icon configuration ────────────────────────────────────────────────────
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  # Use the same source image for iOS and legacy Android (pre-API 26)
  image_path: "assets/images/app_icon.png"

  android: true
  ios: true
  min_sdk_android: 23

  # Android adaptive icon (API 26+): dark background + foreground crescent
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"

  # Remove any old default icon
  remove_alpha_ios: true

# ── Native splash screen configuration ───────────────────────────────────────
# Run: dart run flutter_native_splash:create
flutter_native_splash:
  # Background color matches app dark theme
  color: "#0A0A0F"
  color_dark: "#0A0A0F"

  # Centered logo shown during launch
  image: assets/images/splash_logo.png
  image_dark: assets/images/splash_logo.png

  # Branding (shown at bottom on iOS; ignored on Android 12+)
  branding: assets/images/splash_logo.png
  branding_dark: assets/images/splash_logo.png
  branding_bottom_padding: 24

  # Android 12+ splash screen
  android_12:
    color: "#0A0A0F"
    color_dark: "#0A0A0F"
    image: assets/images/app_icon_foreground.png
    image_dark: assets/images/app_icon_foreground.png
    # Icon background is the same dark color
    icon_background_color: "#0A0A0F"
    icon_background_color_dark: "#0A0A0F"

  # Keep the splash visible until Flutter calls
  # FlutterNativeSplash.remove() — triggered in main.dart after init.
  fullscreen: true
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
