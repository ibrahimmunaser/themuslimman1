workflows:

  # ────────────────────────────────────────────────────────────────────────────
  # ANDROID — builds a signed release AAB and uploads to Play Store internal track
  # ────────────────────────────────────────────────────────────────────────────
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17
      # Upload your keystore in Codemagic → Team Settings → Code Signing Identities
      # → Android keystores, then put the reference name below.
      android_signing:
        - themuslimman_keystore
      # Uncomment when Google Play JSON key is set up in Codemagic:
      # groups:
      #   - google_play   # GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'android-v*'
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: seerah-mobile/seerah_app

      - name: Build release AAB
        script: flutter build appbundle --release
        working_directory: seerah-mobile/seerah_app

    artifacts:
      - seerah-mobile/seerah_app/build/app/outputs/bundle/release/app-release.aab

    publishing:
      email:
        recipients:
          - builds@themuslimman.com   # ← change to your email
        notify:
          success: true
          failure: true
      # Uncomment after adding GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS in Codemagic:
      # google_play:
      #   credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
      #   submit_as_draft: true

  # ────────────────────────────────────────────────────────────────────────────
  # iOS — one-time: create App Store provisioning profile on Apple
  #
  # Run this ONCE manually in Codemagic (no tag trigger) if Fetch profiles shows 0.
  # After it succeeds:
  #   Code signing → iOS provisioning profiles → Fetch profiles
  #   → select com.themuslimman.seerah App Store profile
  #   → reference name: themuslimman_appstore
  # ────────────────────────────────────────────────────────────────────────────
  ios-create-profile:
    name: iOS Create Profile
    max_build_duration: 15
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      vars:
        BUNDLE_ID: com.themuslimman.seerah
        PROFILE_NAME: TheMuslimMan App Store

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'profile-*'
          include: true

    scripts:
      - name: Create App Store provisioning profile on Apple
        script: |
          set -e
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          if app-store-connect profiles list \
              --type IOS_APP_STORE \
              --name "$PROFILE_NAME" \
              --profiles-dir "$PROFILE_DIR" \
              --save && compgen -G "$PROFILE_DIR"/*.mobileprovision > /dev/null; then
            echo "Profile already exists on Apple."
            exit 0
          fi

          echo "Creating App Store provisioning profile on Apple Developer Portal..."
          BUNDLE_ID_RES=$(app-store-connect bundle-ids list --json | python3 -c "
          import json, sys, os
          bid = os.environ['BUNDLE_ID']
          for item in json.load(sys.stdin):
              attrs = item.get('attributes') or {}
              if attrs.get('identifier') == bid:
                  print(item['id'])
                  break
          else:
              sys.exit('Bundle ID not found on Apple Developer Portal')
          ")

          CERT_ID=$(app-store-connect certificates list --json | python3 -c "
          import json, sys
          certs = json.load(sys.stdin)
          preferred = ('IOS_DISTRIBUTION', 'DISTRIBUTION')
          for cert_type in preferred:
              for cert in certs:
                  attrs = cert.get('attributes') or {}
                  if attrs.get('certificateType') == cert_type:
                      print(cert['id'])
                      break
              else:
                  continue
              break
          else:
              sys.exit('No distribution certificate found on Apple Developer Portal')
          ")

          app-store-connect profiles create "$BUNDLE_ID_RES" \
            --certificate-ids "$CERT_ID" \
            --type IOS_APP_STORE \
            --name "$PROFILE_NAME" \
            --profiles-dir "$PROFILE_DIR" \
            --save

          echo "Done. Now fetch the profile in Codemagic UI with reference: themuslimman_appstore"

  # ────────────────────────────────────────────────────────────────────────────
  # iOS — builds a signed IPA and uploads to TestFlight
  #
  # Prerequisites in Codemagic Team Settings (one-time):
  #   1. Integrations → Apple Developer Portal → API key named "Codemagic"
  #   2. Code signing → iOS certificates → "themuslimman certificate" (production)
  #   3. Run ios-create-profile once, then Fetch profiles → reference: themuslimman_appstore
  # ────────────────────────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.themuslimman.seerah
      ios_signing:
        provisioning_profiles:
          - themuslimman_appstore
        certificates:
          - themuslimman certificate

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: seerah-mobile/seerah_app

      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
        working_directory: seerah-mobile/seerah_app

      - name: Set up code signing on Xcode project
        script: |
          cat > /Users/builder/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --archive-method app-store \
            --export-options-plist /Users/builder/export_options.plist \
            --code-signing-setup-verbose-logging
        working_directory: seerah-mobile/seerah_app

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
        working_directory: seerah-mobile/seerah_app

    artifacts:
      - seerah-mobile/seerah_app/build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - builds@themuslimman.com   # ← change to your email
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
